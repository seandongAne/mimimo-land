<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MIMIMO Land</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- ===== Character creator ===== -->
  <div id="creator">
    <h1 class="wordmark" aria-label="MIMIMO Land">
      <span>M</span><span>I</span><span>M</span><span>I</span><span>M</span><span>O</span>
      <span class="gap"></span>
      <span>L</span><span>A</span><span>N</span><span>D</span>
    </h1>

    <div class="panel">
      <p class="panel-title">Make your mimimo!</p>

      <p class="step-label"><span class="step-num">1</span> Who are you?</p>
      <div id="speciesRow" class="chip-row"></div>

      <p class="step-label"><span class="step-num">2</span> Body shape</p>
      <div id="shapeRow" class="chip-row"></div>

      <p class="step-label"><span class="step-num">3</span> Pick your color</p>
      <div id="colorRow" class="swatch-row"></div>

      <p class="step-label"><span class="step-num">4</span> Pick your powers <small>(choose more than one!)</small></p>
      <div id="powerChoiceRow" class="chip-row"></div>

      <p class="step-label"><span class="step-num">5</span> Your name</p>
      <div class="name-row">
        <input id="nameInput" type="text" maxlength="12" autocomplete="off" spellcheck="false" />
        <button id="diceBtn" class="squishy" title="Random name">🎲</button>
      </div>

      <button id="startBtn" class="squishy">Let's&nbsp;go! ✨</button>
    </div>
  </div>

  <!-- ===== In-game HUD ===== -->
  <div id="hud" class="hidden">
    <div id="badge"></div>
    <button id="newBtn" class="squishy">🌟 New mimimo</button>
    <button id="timeBtn" class="squishy" title="Jump to the next time of day"></button>
    <div id="hint"></div>
    <button id="greetBtn" class="squishy" title="Say hi! (H)">👋</button>
    <button id="magicBtn" class="squishy" title="Use power (SPACE)">✨</button>
    <div id="powerTray" aria-label="Selected powers"></div>
    <div id="joy"><div id="joyNub"></div></div>

    <button id="enterPrompt" class="squishy hidden"></button>

    <!-- build-your-own-house bar (shown inside a house) -->
    <div id="buildBar" class="hidden">
      <p id="buildHint">🔨 Tap the floor to place — walk with WASD / the wheel</p>
      <div id="toolRow"></div>
      <div class="build-actions">
        <button id="rotateBtn" class="squishy" title="Rotate the next furniture (R)">↻ 0°</button>
        <button id="undoBtn" class="squishy" title="Undo">↩️</button>
        <button id="clearBtn" class="squishy" title="Clear the room">🧹</button>
        <button id="sleepBtn" class="squishy" disabled>🛏️ Place a bed</button>
        <button id="exitBtn" class="squishy">🚪 Leave</button>
      </div>
    </div>

    <!-- shop interior controls -->
    <div id="shopBar" class="hidden">
      <p id="shopTitle"></p>
      <div id="productRow"></div>
      <div class="shop-actions">
        <span id="cartCount">🛒 Cart: 0</span>
        <button id="checkoutBtn" class="squishy">💖 Buy cart</button>
        <button id="shopExitBtn" class="squishy">🚪 Leave shop</button>
      </div>
      <p id="shopFeedback" aria-live="polite"></p>
    </div>

    <!-- underwater controls -->
    <div id="underwaterBar" class="hidden">
      <span>🤿 Swim with WASD / the wheel</span>
      <button id="diveExitBtn" class="squishy">🪜 Climb out</button>
    </div>
  </div>

  <div id="sleepOverlay" class="hidden" role="dialog" aria-modal="true" aria-label="Sleeping">
    <div class="sleep-card">
      <div class="sleep-moon">🌙</div>
      <p>Good night, mimimo…</p>
      <div class="sleep-zzzs">Z&nbsp; z&nbsp; z</div>
      <button id="wakeBtn" class="squishy">🌅 Wake up</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
